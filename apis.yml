aid: rs-legacy
name: RS Legacy
description: >-
  RS Legacy Corporation is the post-bankruptcy successor entity of RadioShack
  Corporation, the iconic American consumer electronics retailer founded in 1921.
  RadioShack filed for Chapter 11 bankruptcy in 2015, with RS Legacy Corp
  assuming the remaining obligations. The RadioShack brand was subsequently
  acquired by Unicomer Group (El Salvador-based) in 2023, which now operates
  the brand globally in approximately 70 countries including the United States,
  Canada, Europe, and Latin America. RadioShack continues to sell consumer
  electronics, components, batteries, cables, and accessories online at
  radioshack.com and through franchise locations. No public developer API
  is currently documented.
